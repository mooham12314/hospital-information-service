services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://hospital_user:hospital_password@postgres:5432/hospital_db?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-this}
      JWT_TTL_MINUTES: ${JWT_TTL_MINUTES:-60}
      HOSPITAL_A_API_URL: ${HOSPITAL_A_API_URL:-https://hospital-a.api.co.th}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hospital-net

  nginx:
    image: nginx:1.27-alpine
    container_name: hospital-nginx
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - hospital-net

  postgres:
    image: postgres:16-alpine
    container_name: hospital-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hospital_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hospital_password}
      POSTGRES_DB: ${POSTGRES_DB:-hospital_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hospital_user} -d ${POSTGRES_DB:-hospital_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-net

volumes:
  postgres_data:

networks:
  hospital-net:
    driver: bridge
